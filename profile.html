    <main class="dashboard-content profile-page">
        <section class="editInformation">
            <div class="profile">
                <img src="./assets/profile.png" alt="Profile Picture" class="profile-picture">
                <div class="info">
                    <h2 id="profile-name">Amily Doe</h2>
                    <p id="profile-email">amily.doe@example.com</p>
                </div>    
            </div>
            <div class="edit-wrapper">
                <form class="editProfile">
                    <h3>Edit Profile</h3>
                    <input type="text" name="fullname" placeholder="Full Name">
                    <p id="nameError" class="error-message"></p>
                    <input type="text" name="company" placeholder="Company">
                    <button class="login-button" type="submit">Save Changes</button>
                </form>
                <form class="editPassword">
                    <h3>Edit Password</h3>
                    <input type="password" name="currentPassword" placeholder="Current Password">
                    <p id="currentPasswordError" class="error-message"></p>
                    <input type="password" name="newPassword" placeholder="New Password">
                    <p id="newPasswordError" class="error-message"></p>
                    <input type="password" name="confirmPassword" placeholder="Confirm New Password">
                    <p id="confirmError" class="error-message"></p>
                    <button class="login-button" type="submit">Change Password</button>
                </form>
            </div>
        </section>
    </main>
