<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="signup-aside">
            <h2 class="aside-title">Welcome Back!</h2>
            <p class="aside-text">Forgot Your Password?</p>
        </div>

        <div class="login-main">
            <h1 class="login-title">Reset Password</h1>
            <form class="login">
                <input type="email" name="email" placeholder="Email" required>
                <button class="login-button" type="submit">Send Reset Link</button>
            </form>
            <p class="forgot-password"><a href="index.html">Back to Login</a></p>
        </div>
    </div>
</body>
</html>
