<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10X CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- header section with logo and navigation menu -->

    <header class="navbar">
        <div class="nav-logo">
            <a href="index.html">
                <img src="assets/logo.png" alt="10X CRM Logo" class="logo">
            </a>
        </div>

        <nav class="nav-menu">
            <ul class="nav-links">
                <li><a href="#">Marketplace</a></li>
                <li><a href="#">Drops</a></li>
                <li><a href="#">Brands</a></li>
            </ul>

            <div class="nav-auth-buttons">
                <a href="index.html" class="btn-login">Log In</a>
                <a href="signup.html" class="btn-signup">Sign Up</a>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <div class="login-main">
            <h1 class="login-title">Reset Password</h1>
            <form class="login">
                <input type="email" name="email" placeholder="Email" required>
                <button class="login-button" type="submit">Send Reset Link</button>
            </form>
            <p class="forgot-password"><a href="index.html">Back to Login</a></p>
        </div>
    </main>
</body>
</html>
